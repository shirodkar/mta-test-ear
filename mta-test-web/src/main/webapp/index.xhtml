<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <title>#{msg['app.title']}</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <h:outputStylesheet name="css/mta-test.css"/>
</h:head>

<h:body>
    <div class="container">
        <header class="header">
            <h1>#{msg['app.company']}</h1>
            <h2>#{msg['mta-test.form.title']}</h2>
        </header>

        <nav class="nav">
            <ul>
                <li><h:link outcome="/index" value="Home"/></li>
                <li><h:link outcome="/pages/schedule" value="Schedule MtaTest"/></li>
                <li><h:link outcome="/pages/status" value="Check Status"/></li>
            </ul>
        </nav>

        <main class="content">
            <div class="welcome-panel">
                <h3>Welcome to ACME MtaTest Scheduling</h3>
                <p>Schedule a freight mta-test with ACME.
                   Our LTL shipping services cover the continental United States.</p>

                <div class="action-buttons">
                    <h:link outcome="/pages/schedule" styleClass="btn btn-primary">
                        Schedule a New MtaTest
                    </h:link>
                    <h:link outcome="/pages/status" styleClass="btn btn-secondary">
                        Check MtaTest Status
                    </h:link>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; ACME, Inc. All rights reserved.</p>
        </footer>
    </div>
</h:body>

</html>
